apiVersion: apps/v1
kind: Deployment
metadata:
  name: ci-dashboard
  labels:
    app: ci-dashboard
    paas.redhat.com/appcode: ISVD-001
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ci-dashboard
  template:
    metadata:
      labels:
        app: ci-dashboard
        paas.redhat.com/appcode: ISVD-001
    spec:
      containers:
      - name: dashboard
        image: quay.io/medik8s-qe/ci-dashboard:latest
        workingDir: /app
        ports:
        - containerPort: 8080
          protocol: TCP
        volumeMounts:
        - name: data
          mountPath: /data
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /
            port: 8080
          initialDelaySeconds: 60
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: dashboard-data
