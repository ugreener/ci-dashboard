apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: ci-dashboard
  labels:
    app: ci-dashboard
    paas.redhat.com/appcode: ISVD-001
    shard: internal
spec:
  to:
    kind: Service
    name: ci-dashboard
  port:
    targetPort: http
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
