# CI Test Dashboard Configuration - medik8s operators
#
# Tracks Prow periodic test results for medik8s RHWA operators:
# FAR, SBR, SNR, NHC, NMO, MDR
#
# Data source: Prow GCS bucket (public, no auth needed)

# Data collector configuration
collector:
  type: "prow_gcs"

  # Prow GCS configuration
  prow_gcs:
    prow_url: "https://prow.ci.openshift.org"
    gcs_url: "https://gcsweb-ci.apps.ci.l2s4.p1.openshiftapps.com/gcs/test-platform-results"
    bucket: "test-platform-results"

    # Periodic job names to track
    job_names:
      - "periodic-ci-medik8s-system-tests-main-4.22-konflux-e2e-far-weekly-aws"
      - "periodic-ci-medik8s-system-tests-main-4.22-konflux-e2e-sbr-weekly-aws-odf"
      # Add SNR, NHC, NMO, MDR weekly jobs here when created

  # ReportPortal (disabled - uncomment and set values)
  # reportportal:
  #   url: "https://your-reportportal.example.com"
  #   project: "your-project"
  #   # API token: REPORTPORTAL_API_TOKEN env var
  #   job_patterns:
  #     - "periodic-ci-your-team-*"

# Tracking configuration
tracking:
  versions:
    - "4.22"

  platforms:
    - "aws"

  test_suite_filter: ""

  # Weekly jobs need longer lookback than daily
  lookback_days: 90

  blocklist: []

# Database configuration
database:
  path: "/data/dashboard.db"

# Web server configuration
web:
  host: "0.0.0.0"
  port: 8080
  debug: false

# Collection schedule (for automated runs via CronJob)
schedule:
  enabled: false
  cron: "0 8 * * *"
